<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>子供モード デザインモック</title>
    <style>
      :root {
        color-scheme: light;
        font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', system-ui, sans-serif;
        --bg: #f8fafc;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: radial-gradient(circle at top, #e0f2fe 0%, var(--bg) 45%);
        color: var(--text);
      }

      .page {
        max-width: 680px;
        margin: 0 auto;
        padding: 24px 16px 48px;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      h1 {
        margin: 0;
        font-size: 1.85rem;
        font-weight: 800;
        letter-spacing: 0.01em;
      }

      .logout {
        border: 1px solid #cbd5e1;
        background: white;
        color: #334155;
        border-radius: 999px;
        padding: 8px 14px;
        font-size: 0.85rem;
      }

      .actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 18px;
      }

      .action {
        display: inline-flex;
        justify-content: center;
        align-items: center;
        min-height: 52px;
        border-radius: 14px;
        text-decoration: none;
        color: white;
        font-weight: 700;
        box-shadow: var(--shadow);
      }

      .green {
        background: linear-gradient(135deg, #16a34a, #22c55e);
      }
      .indigo {
        background: linear-gradient(135deg, #4f46e5, #6366f1);
      }
      .violet {
        background: linear-gradient(135deg, #7c3aed, #8b5cf6);
      }
      .rose {
        background: linear-gradient(135deg, #e11d48, #f43f5e);
      }

      .card {
        background: var(--card);
        border-radius: 20px;
        box-shadow: var(--shadow);
        padding: 18px;
        margin-top: 14px;
      }

      h2 {
        font-size: 1.1rem;
        margin: 0 0 10px;
      }

      .badges {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .badge {
        background: #fef3c7;
        color: #92400e;
        border-radius: 999px;
        padding: 6px 12px;
        font-size: 0.86rem;
      }

      .card-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }

      .card-head a {
        color: #2563eb;
        font-size: 0.82rem;
      }

      .books {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .book {
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 6px;
      }

      .cover {
        width: 100%;
        aspect-ratio: 3 / 4;
        border-radius: 10px;
        background: linear-gradient(135deg, #bae6fd, #a7f3d0);
        display: grid;
        place-items: center;
        color: #0f766e;
        font-size: 1.8rem;
      }

      .book p {
        margin: 8px 0 0;
        font-size: 0.76rem;
        color: var(--muted);
        line-height: 1.4;
      }

      .footer-note {
        margin-top: 16px;
        color: #64748b;
        font-size: 0.82rem;
      }

      @media (max-width: 560px) {
        .actions,
        .books {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="topbar">
        <h1>あおい のホーム</h1>
        <button class="logout">ログアウト</button>
      </header>

      <section class="actions" aria-label="メインアクション">
        <a class="action green" href="#">きょうの記録をつける</a>
        <a class="action indigo" href="#">本だなを見る</a>
        <a class="action violet" href="#">カレンダーを見る</a>
        <a class="action rose" href="#">メッセージ (2)</a>
      </section>

      <section class="card">
        <h2>バッジ</h2>
        <div class="badges">
          <span class="badge">🌱 はじめての1さつ</span>
          <span class="badge">📘 3日れんぞく</span>
          <span class="badge">🎉 10さつたっせい</span>
        </div>
      </section>

      <section class="card">
        <div class="card-head">
          <h2>さいきん読んだ本</h2>
          <a href="#">過去の記録をひらく</a>
        </div>
        <div class="books">
          <article class="book">
            <div class="cover">📚</div>
            <p>はらぺこあおむし</p>
          </article>
          <article class="book">
            <div class="cover">🐻</div>
            <p>3びきのくま</p>
          </article>
          <article class="book">
            <div class="cover">🌙</div>
            <p>おやすみなさい おつきさま</p>
          </article>
        </div>
      </section>

      <p class="footer-note">※ 現行の子供モード画面構成に寄せた確認用モックです。</p>
    </main>
  </body>
</html>
